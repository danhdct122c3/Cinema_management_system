services:
  mysql:
    image: mysql:8.0
    container_name: cinema_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQLDATABASE}
      MYSQL_USER: ${MYSQLUSER}
      MYSQL_PASSWORD: ${MYSQLPASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - cinema_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 20s
      retries: 10

  app:
    build:
      context: ./cinema-booking
      dockerfile: docker/Dockerfile
    container_name: cinema_app
    restart: unless-stopped
    environment:
      # MySQL - khớp với application.yml
      MYSQLHOST: mysql
      MYSQLPORT: 3306
      MYSQLDATABASE: ${MYSQLDATABASE}
      MYSQLUSER: ${MYSQLUSER}
      MYSQLPASSWORD: ${MYSQLPASSWORD}
      # CORS
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      # VNPay
      VNPAY_RETURN_URL: ${VNPAY_RETURN_URL}
      VNPAY_FRONTEND_RETURN_URL: ${VNPAY_FRONTEND_RETURN_URL}
      # Timezone
      TZ: Asia/Ho_Chi_Minh
      JAVA_TOOL_OPTIONS: -Duser.timezone=Asia/Ho_Chi_Minh
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - cinema_network

  frontend:
    build:
      context: ./cinema-booking-frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_BASE_URL: /home
    container_name: cinema_frontend
    restart: unless-stopped
    environment:
      BACKEND_UPSTREAM_URL: http://app:8080
      PORT: 80
    ports:
      - "80:80"
    depends_on:
      - app
    networks:
      - cinema_network

volumes:
  mysql_data:

networks:
  cinema_network:
    driver: bridge

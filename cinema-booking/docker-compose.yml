version: '3.9'
services:
    image: mysql:8.0.40
    container_name: cinema_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: cinema_db
      MYSQL_USER: cinema_user
    ports:
      MYSQL_INITDB_SKIP_TZINFO: "yes"
      - "3306:3306"
      - "3307:3306"
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - cinema_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      start_period: 30s
      interval: 10s
      timeout: 10s
      retries: 5
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-storage-engine=InnoDB
      - --max_connections=1000
      retries: 10
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/cinema_db
      SPRING_DATASOURCE_USERNAME: cinema_user
      SPRING_DATASOURCE_PASSWORD: cinema_password
    depends_on:
      mysql:
    restart: unless-stopped
        condition: service_healthy
      - cinema_network

      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/cinema_db?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
    image: adminer
    container_name: cinema_adminer
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      JAVA_TOOL_OPTIONS: "-Xmx512m -Xms256m"
    ports:
      - "8081:8080"
    networks:
      - cinema_network
    depends_on:
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health || exit 1"]
      start_period: 40s
      interval: 10s
      timeout: 5s
      retries: 5
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/cinema_db

    image: adminer:latest
  mysql_data:
    restart: unless-stopped
  cinema_network:
    driver: bridge
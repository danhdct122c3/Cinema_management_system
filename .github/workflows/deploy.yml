name: Deploy Backend to EC2

on:
  push:
    branches:
      - main
    paths:
      - 'cinema-booking/**'
      - '.github/workflows/backend-deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build image
        run: |
          docker build \
            -f cinema-booking/docker/Dockerfile \
            -t ${{ secrets.DOCKER_USERNAME }}/cinema-booking:latest \
            cinema-booking

      - name: Push image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/cinema-booking:latest

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~
            sudo docker compose down
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/cinema-booking:latest
            sudo docker compose up -d
            sudo docker image prune -f